<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Métricas - ProFE</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; --card: #ffffff; --text: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        header { text-align: center; margin-bottom: 25px; }
        .logo { max-width: 100%; height: auto; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .phase-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        #btn-enviar { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #btn-enviar:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="images/membrete_profe.png" alt="ProFE" class="logo">
        <h2>Integrales sin Límite</h2>
        <p>Bootcamp de los 5 Días</p>
    </header>
    
    <form id="form-bootcamp">
        <div class="form-group">
            <label>Nombre Completo:</label>
            <input type="text" id="Nombre" name="Nombre" required>
        </div>
        <div class="form-group">
            <label>Número de Identidad:</label>
            <input type="text" id="Identidad" name="Identidad" required>
        </div>
        <div class="form-group">
            <label>Día del Bootcamp:</label>
            <select id="dia_selector" name="Dia_Bootcamp" onchange="actualizarFases()" required>
                <option value="">-- Selecciona el día --</option>
                <option value="1">Día 1: Cimientos</option>
                <option value="2">Día 2: Por Partes</option>
                <option value="3">Día 3: Fracciones Parciales</option>
                <option value="4">Día 4: Trigonométricas</option>
                <option value="5">Día 5: Estrategia Final</option>
            </select>
        </div>

        <div id="contenedor_fases"></div>

        <div class="form-group" id="seccion_cuadrante" style="display:none;">
            <label>¿En qué cuadrante terminaste?</label>
            <select name="Cuadrante" id="Cuadrante">
                <option value="I">I: Fluidez (Rápido y Preciso)</option>
                <option value="II">II: Sobrecarga (Lento pero Preciso)</option>
                <option value="III">III: Brecha (Lento e Impreciso)</option>
                <option value="IV">IV: Impulsividad (Rápido pero Impreciso)</option>
            </select>
        </div>

        <button type="button" id="btn-enviar" onclick="enviarDatos()">Enviar Métricas al ProFE</button>
    </form>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzaF_1WNGWO9PHyrCCd8J6ZoIO8FykISY0n1cVbO4AP0EkfnpOmspa-CVIxIwnATvLU/exec";

    const esquemaFases = {
        "1": ["F1: Sanación", "F2: Directas", "F3: Aislamiento u", "F4: Retorno x", "F5: Reto Final"],
        "2": ["F1: Sanación", "F2: ILATE", "F3: Tabular", "F4: Cíclicas", "F5: Reto Final"],
        "3": ["F1: Álgebra", "F2: Estructura", "F3: Reto Final"],
        "4": ["F1: Identidades", "F2: Triángulo", "F3: Reto Final"],
        "5": ["F1: Clasificación", "F2: Gran Reto Final"]
    };

    function actualizarFases() {
        console.log("Cambiando día..."); // Para depuración
        const dia = document.getElementById('dia_selector').value;
        const contenedor = document.getElementById('contenedor_fases');
        const cuadrante = document.getElementById('seccion_cuadrante');
        
        contenedor.innerHTML = ''; 
        
        if (dia && esquemaFases[dia]) {
            cuadrante.style.display = 'block';
            esquemaFases[dia].forEach((nombreFase, i) => {
                const faseNum = i + 1;
                const html = `
                    <div class="phase-card">
                        <h4>${nombreFase}</h4>
                        <div class="grid">
                            <div>
                                <label>IET %</label>
                                <input type="number" name="D${dia}_F${faseNum}_IET" required>
                            </div>
                            <div>
                                <label>Aciertos %</label>
                                <input type="number" name="D${dia}_F${faseNum}_ACC" required>
                            </div>
                        </div>
                    </div>`;
                contenedor.insertAdjacentHTML('beforeend', html);
            });
        } else {
            cuadrante.style.display = 'none';
        }
    }

    function enviarDatos() {
        const btn = document.getElementById('btn-enviar');
        const form = document.getElementById('form-bootcamp');
        
        if (!form.Nombre.value || !form.Dia_Bootcamp.value) {
            alert("Completa los datos básicos.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        const datos = new URLSearchParams();
        // Captura manual de todos los elementos para evitar fallos de FormData
        const elementos = form.querySelectorAll("input, select");
        elementos.forEach(el => {
            if(el.name && el.value) {
                datos.append(el.name, el.value);
            }
        });

        fetch(GOOGLE_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: datos.toString()
        })
        .then(() => {
            alert("¡Métricas enviadas con éxito, ProFE!");
            form.reset();
            actualizarFases();
            btn.disabled = false;
            btn.innerText = "Enviar Métricas al ProFE";
        })
        .catch(err => {
            console.error(err);
            alert("Error de conexión. Intenta de nuevo.");
            btn.disabled = false;
            btn.innerText = "Enviar Métricas al ProFE";
        });
    }
</script>
</body>
</html>
